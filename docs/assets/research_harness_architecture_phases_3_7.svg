  <rect class="participant" x="745" y="650" width="530" height="88" rx="8" fill="#BCE8DA"/>
  <text class="box-title" x="1010" y="686" text-anchor="middle">Iterative Product-Agent Loop</text>
  <text class="box-body" x="1010" y="712" text-anchor="middle">research / optimize / optimize_query / challenge</text>

  <path d="M 575 780 C 548 780 548 818 575 818 C 608 818 608 792 575 792" fill="none" stroke="#747970" stroke-width="2.1" marker-end="url(#arrow)"/>
