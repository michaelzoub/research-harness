  <text class="small" x="138" y="312">goal + flags / interactive choices</text>

  <path class="arrow" d="M 320 398 L 575 398"/>
  <text class="small" x="342" y="380">build HarnessConfig, load dotenv, route mode</text>

  <rect class="note" x="445" y="432" width="260" height="92" rx="8"/>
  <text class="callout-title" x="467" y="464">RunRecord + PRD</text>
  <text class="callout" x="467" y="489">prompt_versions</text>
  <text class="callout" x="467" y="511">harness_config_snapshot</text>
  <text class="phase" x="646" y="464" text-anchor="end">P4</text>
