  <text class="callout" x="294" y="1770">save proposed config variants</text>
  <text class="callout" x="294" y="1796">benchmark comparison before accept</text>
  <text class="callout" x="294" y="1822">keep / reject / ask-human records</text>
  <text class="callout" x="294" y="1848">branch/config only; prevent code mutation</text>
  <text class="phase phase-rust" x="558" y="1742" text-anchor="end">P6 TODO</text>

