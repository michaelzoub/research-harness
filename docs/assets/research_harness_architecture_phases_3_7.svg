<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2100" viewBox="0 0 1800 2100">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 10 6 L 1 11" fill="none" stroke="#6f756f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowRust" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 10 6 L 1 11" fill="none" stroke="#D97843" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .bg { fill: #FFFFFF; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 56px; font-weight: 760; letter-spacing: 0; fill: #0b0d0c; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; font-weight: 520; fill: #626861; }
      .lane-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; font-weight: 720; fill: #5f665f; letter-spacing: 1px; }
      .lane-label-dark { fill: #FFFFFF; }
      .small { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 560; fill: #6b7069; }
      .micro { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; font-weight: 560; fill: #737a72; }
      .phase { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 14px; font-weight: 760; fill: #16775d; }
      .phase-rust { fill: #B85F33; }
      .box-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 19px; font-weight: 760; fill: #5e665f; }
      .box-body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 560; fill: #697069; }
      .callout-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 780; fill: #2e332f; }
      .callout { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 560; fill: #5f665f; }
      .line { stroke: #cfd5cc; stroke-width: 2; }
      .arrow { stroke: #6f756f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #8b9188; stroke-width: 1.9; fill: none; marker-end: url(#arrow); }
      .arrow-rust { stroke: #D97843; stroke-width: 2.3; fill: none; marker-end: url(#arrowRust); }
      .loop { fill: #EAF8F3; stroke: #27AE86; stroke-width: 2.2; }
      .loop-dashed { fill: #FFFFFF; stroke: #D97843; stroke-width: 2.2; stroke-dasharray: 10 8; }
      .participant { stroke: #7a817a; stroke-width: 2.2; }
      .note { fill: #FFFFFF; stroke: #c9cec8; stroke-width: 1.8; }
      .note-rust { fill: #FFF8F3; stroke: #D97843; stroke-width: 1.8; }
