  <text class="callout" x="680" y="1770">multi-cycle research loops</text>
  <text class="callout" x="680" y="1796">entropy injection + periodic self-review</text>
  <text class="callout" x="680" y="1822">plateau on source/claim/hypothesis deltas</text>
  <text class="callout" x="680" y="1848">human checkpoints + session continuation</text>
  <text class="phase phase-rust" x="964" y="1742" text-anchor="end">P7 TODO</text>

